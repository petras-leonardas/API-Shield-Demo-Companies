<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CartNova — Modern E-Commerce Marketplace</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body class="bg-gray-50 min-h-screen">

  <!-- Main content (nav injected above by nav.js) -->
  <main class="max-w-7xl mx-auto px-4 py-6">

    <!-- Hero / search results heading -->
    <div id="page-heading" class="mb-6">
      <h1 class="text-2xl font-bold text-gray-900">All Products</h1>
      <p class="text-gray-500 text-sm mt-1">Browse our catalog of quality products from trusted sellers</p>
    </div>

    <!-- Category chips (loaded dynamically) -->
    <div id="category-chips" class="flex flex-wrap gap-2 mb-6"></div>

    <!-- Product grid -->
    <div id="product-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
      <!-- Loading state -->
      <div class="col-span-full flex justify-center py-12">
        <div class="spinner"></div>
      </div>
    </div>

    <!-- Pagination -->
    <div id="pagination" class="flex items-center justify-center gap-4 mt-8 hidden">
      <button id="prev-btn" class="px-4 py-2 text-sm border border-gray-300 rounded-lg hover:bg-gray-100 disabled:opacity-40 disabled:cursor-not-allowed">Previous</button>
      <span id="page-info" class="text-sm text-gray-600"></span>
      <button id="next-btn" class="px-4 py-2 text-sm border border-gray-300 rounded-lg hover:bg-gray-100 disabled:opacity-40 disabled:cursor-not-allowed">Next</button>
    </div>
  </main>

  <!-- API Endpoints annotation -->
  <footer class="max-w-7xl mx-auto px-4 pb-8 mt-8">
    <details class="api-panel bg-gray-900 text-green-400 rounded-lg p-4">
      <summary class="text-gray-400 hover:text-green-400 transition-colors">API Endpoints used on this page</summary>
      <div class="mt-3 space-y-1">
        <div>GET /api/v2/products?page={n}&amp;limit=12 <span class="text-gray-500">— catalog listing</span></div>
        <div>GET /api/v2/products/search?q={term} <span class="text-gray-500">— search results</span></div>
        <div>GET /api/v2/categories <span class="text-gray-500">— category chips</span></div>
      </div>
    </details>
  </footer>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/nav.js"></script>
  <script src="/js/home.js"></script>
</body>
</html>
