<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CartNova — My Orders</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body class="bg-gray-50 min-h-screen">

  <main class="max-w-3xl mx-auto px-4 py-6">
    <h1 class="text-2xl font-bold text-gray-900 mb-6">My Orders</h1>

    <!-- Order list -->
    <div id="orders-list" class="space-y-4">
      <div class="flex justify-center py-12"><div class="spinner"></div></div>
    </div>

    <!-- Order detail panel (shown when clicking an order) -->
    <div id="order-detail" class="hidden mt-6">
      <div class="bg-white rounded-lg shadow-sm overflow-hidden">
        <div class="p-4 bg-gray-50 border-b border-gray-200 flex items-center justify-between">
          <h2 class="font-semibold text-gray-900">Order Detail</h2>
          <button onclick="closeDetail()" class="text-sm text-gray-500 hover:text-gray-700">Close</button>
        </div>
        <div id="detail-content" class="p-4"></div>
      </div>
    </div>
  </main>

  <footer class="max-w-3xl mx-auto px-4 pb-8 mt-8">
    <details class="api-panel bg-gray-900 text-green-400 rounded-lg p-4">
      <summary class="text-gray-400 hover:text-green-400 transition-colors">API Endpoints used on this page</summary>
      <div class="mt-3 space-y-1">
        <div>GET /api/v2/orders <span class="text-gray-500">— order history</span></div>
        <div>GET /api/v2/orders/{order_id} <span class="text-gray-500">— order detail</span></div>
        <div>GET /api/v2/orders/{order_id}/tracking <span class="text-gray-500">— shipping tracking</span></div>
        <div>POST /api/v2/orders/{order_id}/return <span class="text-gray-500">— initiate return</span></div>
      </div>
    </details>
  </footer>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/nav.js"></script>
  <script src="/js/orders.js"></script>
</body>
</html>
