<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CartNova — Product</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body class="bg-gray-50 min-h-screen">

  <main class="max-w-7xl mx-auto px-4 py-6">
    <!-- Breadcrumb -->
    <nav class="text-sm text-gray-500 mb-4">
      <a href="/" class="hover:text-indigo-600">Home</a>
      <span class="mx-1">/</span>
      <span id="breadcrumb-category">Products</span>
      <span class="mx-1">/</span>
      <span id="breadcrumb-product" class="text-gray-900"></span>
    </nav>

    <!-- Product detail (loaded dynamically) -->
    <div id="product-detail" class="flex justify-center py-12">
      <div class="spinner"></div>
    </div>

    <!-- Reviews section -->
    <div id="reviews-section" class="mt-10 hidden">
      <h2 class="text-xl font-bold text-gray-900 mb-4">Customer Reviews</h2>
      <div id="reviews-list" class="space-y-4"></div>
    </div>
  </main>

  <footer class="max-w-7xl mx-auto px-4 pb-8 mt-8">
    <details class="api-panel bg-gray-900 text-green-400 rounded-lg p-4">
      <summary class="text-gray-400 hover:text-green-400 transition-colors">API Endpoints used on this page</summary>
      <div class="mt-3 space-y-1">
        <div>GET /api/v2/products/{product_id} <span class="text-gray-500">— product detail</span></div>
        <div>GET /api/v2/products/{product_id}/reviews <span class="text-gray-500">— customer reviews</span></div>
        <div>GET /api/v2/products/{product_id}/variants <span class="text-gray-500">— size/color variants</span></div>
        <div>POST /api/v2/cart/items <span class="text-gray-500">— add to cart (requires auth)</span></div>
      </div>
    </details>
  </footer>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/nav.js"></script>
  <script src="/js/product.js"></script>
</body>
</html>
