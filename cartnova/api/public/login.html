<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CartNova — Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body class="bg-gray-50 min-h-screen">

  <main class="max-w-md mx-auto px-4 py-12">
    <div class="text-center mb-8">
      <div class="w-12 h-12 bg-indigo-600 rounded-xl flex items-center justify-center mx-auto mb-3">
        <span class="text-white font-bold text-lg">CN</span>
      </div>
      <h1 class="text-2xl font-bold text-gray-900">Welcome to CartNova</h1>
    </div>

    <!-- Tab toggle -->
    <div class="flex bg-gray-100 rounded-lg p-1 mb-6">
      <button id="login-tab" onclick="switchTab('login')"
        class="flex-1 py-2 text-sm font-semibold rounded-md transition-colors bg-white text-gray-900 shadow-sm">
        Login
      </button>
      <button id="register-tab" onclick="switchTab('register')"
        class="flex-1 py-2 text-sm font-semibold rounded-md transition-colors text-gray-500">
        Register
      </button>
    </div>

    <!-- Login Form -->
    <form id="login-form" class="bg-white rounded-lg shadow-sm p-6 space-y-4" onsubmit="handleLogin(event)">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
        <input type="email" id="login-email" required placeholder="you@example.com"
          class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500 focus:outline-none">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
        <input type="password" id="login-password" required placeholder="Your password"
          class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500 focus:outline-none">
      </div>
      <div id="login-error" class="text-red-500 text-sm hidden"></div>
      <button type="submit" id="login-btn"
        class="w-full bg-indigo-600 text-white py-2.5 rounded-lg font-semibold hover:bg-indigo-700 transition-colors disabled:bg-gray-300">
        Sign In
      </button>
    </form>

    <!-- Register Form -->
    <form id="register-form" class="bg-white rounded-lg shadow-sm p-6 space-y-4 hidden" onsubmit="handleRegister(event)">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Full Name</label>
        <input type="text" id="register-name" required placeholder="Your name"
          class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500 focus:outline-none">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
        <input type="email" id="register-email" required placeholder="you@example.com"
          class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500 focus:outline-none">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
        <input type="password" id="register-password" required placeholder="Choose a password"
          class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500 focus:outline-none">
      </div>
      <div id="register-error" class="text-red-500 text-sm hidden"></div>
      <button type="submit" id="register-btn"
        class="w-full bg-indigo-600 text-white py-2.5 rounded-lg font-semibold hover:bg-indigo-700 transition-colors disabled:bg-gray-300">
        Create Account
      </button>
    </form>

    <!-- Test credentials -->
    <div class="mt-6 bg-amber-50 border border-amber-200 rounded-lg p-4">
      <p class="text-sm font-semibold text-amber-800 mb-2">Test Accounts (any password works)</p>
      <div class="space-y-1 text-sm text-amber-700">
        <button onclick="fillLogin('emma.johnson@example.com')" class="block hover:underline cursor-pointer">Emma Johnson — emma.johnson@example.com</button>
        <button onclick="fillLogin('lucas.chen@example.com')" class="block hover:underline cursor-pointer">Lucas Chen — lucas.chen@example.com</button>
        <button onclick="fillLogin('sofia.martinez@example.com')" class="block hover:underline cursor-pointer">Sofia Martinez — sofia.martinez@example.com</button>
      </div>
    </div>
  </main>

  <footer class="max-w-md mx-auto px-4 pb-8 mt-4">
    <details class="api-panel bg-gray-900 text-green-400 rounded-lg p-4">
      <summary class="text-gray-400 hover:text-green-400 transition-colors">API Endpoints used on this page</summary>
      <div class="mt-3 space-y-1">
        <div>POST /api/v2/auth/login <span class="text-gray-500">— authenticate user</span></div>
        <div>POST /api/v2/auth/register <span class="text-gray-500">— create account</span></div>
      </div>
    </details>
  </footer>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/login.js"></script>
</body>
</html>
