<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CartNova — My Account</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body class="bg-gray-50 min-h-screen">

  <main class="max-w-3xl mx-auto px-4 py-6">
    <h1 class="text-2xl font-bold text-gray-900 mb-6">My Account</h1>

    <div class="grid md:grid-cols-2 gap-6">
      <!-- Profile -->
      <div class="bg-white rounded-lg shadow-sm p-6">
        <div class="flex items-center justify-between mb-4">
          <h2 class="text-lg font-semibold text-gray-900">Profile</h2>
          <button id="edit-toggle" onclick="toggleEdit()" class="text-sm text-indigo-600 hover:underline">Edit</button>
        </div>
        <div id="profile-view" class="space-y-2 text-sm">
          <div class="flex justify-center py-4"><div class="spinner"></div></div>
        </div>
        <form id="profile-form" class="space-y-3 hidden" onsubmit="saveProfile(event)">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Name</label>
            <input type="text" id="edit-name" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500 focus:outline-none">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Phone</label>
            <input type="text" id="edit-phone" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500 focus:outline-none">
          </div>
          <div class="flex gap-2">
            <button type="submit" class="bg-indigo-600 text-white px-4 py-2 rounded-lg text-sm font-semibold hover:bg-indigo-700">Save</button>
            <button type="button" onclick="toggleEdit()" class="border border-gray-300 px-4 py-2 rounded-lg text-sm hover:bg-gray-50">Cancel</button>
          </div>
        </form>
      </div>

      <!-- Addresses -->
      <div class="bg-white rounded-lg shadow-sm p-6">
        <h2 class="text-lg font-semibold text-gray-900 mb-4">Saved Addresses</h2>
        <div id="addresses-list" class="space-y-3 text-sm">
          <div class="flex justify-center py-4"><div class="spinner"></div></div>
        </div>
      </div>
    </div>

    <!-- Quick links -->
    <div class="mt-6 grid grid-cols-2 gap-4">
      <a href="/orders.html" class="bg-white rounded-lg shadow-sm p-4 hover:shadow-md transition-shadow block">
        <h3 class="font-semibold text-gray-900">My Orders</h3>
        <p class="text-sm text-gray-500 mt-1">View order history and tracking</p>
      </a>
      <a href="/cart.html" class="bg-white rounded-lg shadow-sm p-4 hover:shadow-md transition-shadow block">
        <h3 class="font-semibold text-gray-900">Shopping Cart</h3>
        <p class="text-sm text-gray-500 mt-1">View items in your cart</p>
      </a>
    </div>
  </main>

  <footer class="max-w-3xl mx-auto px-4 pb-8 mt-8">
    <details class="api-panel bg-gray-900 text-green-400 rounded-lg p-4">
      <summary class="text-gray-400 hover:text-green-400 transition-colors">API Endpoints used on this page</summary>
      <div class="mt-3 space-y-1">
        <div>GET /api/v2/users/me <span class="text-gray-500">— load profile</span></div>
        <div>PUT /api/v2/users/me <span class="text-gray-500">— update profile</span></div>
        <div>GET /api/v2/users/me/addresses <span class="text-gray-500">— saved addresses</span></div>
      </div>
    </details>
  </footer>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/nav.js"></script>
  <script src="/js/account.js"></script>
</body>
</html>
