<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CartNova — Category</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body class="bg-gray-50 min-h-screen">

  <main class="max-w-7xl mx-auto px-4 py-6">
    <nav class="text-sm text-gray-500 mb-4">
      <a href="/" class="hover:text-indigo-600">Home</a>
      <span class="mx-1">/</span>
      <span id="breadcrumb-category" class="text-gray-900"></span>
    </nav>

    <h1 id="category-title" class="text-2xl font-bold text-gray-900 mb-6"></h1>

    <div id="product-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
      <div class="col-span-full flex justify-center py-12">
        <div class="spinner"></div>
      </div>
    </div>
  </main>

  <footer class="max-w-7xl mx-auto px-4 pb-8 mt-8">
    <details class="api-panel bg-gray-900 text-green-400 rounded-lg p-4">
      <summary class="text-gray-400 hover:text-green-400 transition-colors">API Endpoints used on this page</summary>
      <div class="mt-3 space-y-1">
        <div>GET /api/v2/categories/{category_id}/products <span class="text-gray-500">— products in this category</span></div>
      </div>
    </details>
  </footer>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/nav.js"></script>
  <script src="/js/category.js"></script>
</body>
</html>
